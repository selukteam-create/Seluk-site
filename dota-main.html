<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTA 2 MAIN</title>
    <link rel="stylesheet" href="team.css">
</head>

<body>

    <main class="team-container">

        <h1 class="team-title">DOTA 2 MAIN</h1>

        <div class="players">

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <h2>Not yet</h2>
                <div class="role">
                    <span>Carry</span>
                    <img src="./Media/Carry.png" class="role-icon" alt="">
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <h2>Not yet</h2>
                <div class="role">
                    <span>Mid</span>
                    <img src="./Media/Mid.png" class="role-icon" alt="">
                </div>
            </div>

            <div class="player" data-player="anton">
                <img src="./Media/Anton.png" class="avatar" alt="Anton">
                <h2>Anton</h2>
                <div class="role">
                    <span>Offlane</span>
                    <img src="./Media/offlane.png" class="role-icon" alt="">
                </div>
            </div>

            <div class="player captain" data-player="roma3sss">
                <img src="./Media/crown.png" class="crown" alt="captain">
                <img src="./Media/roma3SSS.png" class="avatar" alt="Roma3SSS">
                <h2>Roma3SSS</h2>
                <div class="role">
                    <span>Support</span>
                    <img src="./Media/Support.png" class="role-icon" alt="">
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <h2>Not yet</h2>
                <div class="role">
                    <span>Hard Support</span>
                    <img src="./Media/Hard_support.png" class="role-icon" alt="">
                </div>
            </div>

        </div>

    </main>

    <!-- MODAL -->
    <div id="player-modal" class="modal hidden">
        <div class="modal-content">

            <img id="birthday-cake" class="cake" src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="cake">

            <img id="modal-avatar" class="modal-avatar" alt="avatar">

            <div class="modal-header">
                <h2 id="modal-name"></h2>

            </div>

            <p id="modal-age"></p>
            <p id="modal-bio"></p>

            <button id="modal-faceit" class="faceit-btn">FACEIT</button>

            <div class="modal-socials">

                <img data-type="telegram" src="https://img.icons8.com/color/48/telegram-app.png" alt="">
                <img data-type="youtube" src="https://img.icons8.com/color/48/youtube-play.png" alt="">
                <img data-type="tiktok" src="https://img.icons8.com/color/48/tiktok.png" alt="">
                <img data-type="twitter" src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png" alt="">
                <img data-type="reddit" src="https://img.icons8.com/color/48/reddit.png" alt="">
                <img data-type="steam" src="https://img.icons8.com/color/48/steam.png" alt="">
                <img data-type="instagram" src="https://img.icons8.com/color/48/instagram-new.png" alt="">

            </div>

            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
    </div>

    <script src="player-modal.js" defer></script>

</body>

</html>
