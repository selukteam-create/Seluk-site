<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials</title>
    <link rel="icon" href="./favicon.ico?v=2">
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <section class="socials container">

        <h1 class="social-title" data-key="follow">FOLLOW US</h1>

        <div class="social-grid">

            <div class="social-card twitter" onclick="window.open('https://twitter.com/SelukTeam')">
                <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png" alt="">
                <h2>@SelukTeam</h2>
                <span data-key="social_twitter">Twitter</span>
            </div>

            <div class="social-card reddit" onclick="window.open('https://reddit.com/u/SelukTeam')">
                <img class="icon" src="https://img.icons8.com/color/48/reddit.png" alt="">
                <h2>u/SelukTeam</h2>
                <span data-key="social_reddit">Reddit</span>
            </div>

            <div class="social-card tiktok" onclick="window.open('https://tiktok.com/@seluk.team')">
                <img class="icon" src="https://img.icons8.com/color/48/tiktok.png" alt="">
                <h2>@seluk.team</h2>
                <span data-key="social_tiktok">TikTok</span>
            </div>

            <div class="social-card telegram" onclick="window.open('https://t.me/seluk_team')">
                <img class="icon" src="https://img.icons8.com/color/48/telegram-app.png" alt="">
                <h2>@seluk_team</h2>
                <span data-key="social_telegram">Telegram</span>
            </div>

            <div class="social-card discord" onclick="window.open('https://discord.gg/e5pbCrrm')">
                <img class="icon" src="https://img.icons8.com/color/48/discord-logo.png" alt="">
                <h2>Seluk Team</h2>
                <span>Discord</span>
            </div>

            <div class="social-card youtube" onclick="window.open('https://www.youtube.com/@selukteam')">
                <img class="icon" src="https://img.icons8.com/color/48/youtube-play.png" alt="">
                <h2>@selukteam</h2>
                <span data-key="social_youtube">YouTube</span>
            </div>

        </div>

    </section>

    <script src="Script.js" defer></script>
</body>

</html>


</html>
