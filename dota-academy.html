<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/Seluk-site/favicon.ico">
    <link rel="icon" href="./favicon.ico?v=2">
    <title>Dota 2 Academy</title>
    <link rel="stylesheet" href="team.css">
</head>

<body>

    <main class="team-container">

        <h1 class="team-title">DOTA 2 ACADEMY</h1>

        <div class="players">

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <div class="name">Soon...</div>
                <div class="role">
                    <img src="./Media/Carry.png" class="role-icon" alt="">
                    Carry
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <div class="name">Soon...</div>
                <div class="role">
                    <img src="./Media/Mid.png" class="role-icon" alt="">
                    Mid
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <div class="name">Soon...</div>
                <div class="role">
                    <img src="./Media/offlane.png" class="role-icon" alt="">
                    Offlane
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <div class="name">Soon...</div>
                <div class="role">
                    <img src="./Media/Support.png" class="role-icon" alt="">
                    Support
                </div>
            </div>

            <div class="player">
                <img src="./Media/0one.png" class="avatar" alt="player">
                <div class="name">Soon...</div>
                <div class="role">
                    <img src="./Media/Hard_support.png" class="role-icon" alt="">
                    Hard Support
                </div>
            </div>

        </div>

    </main>

    <div id="player-modal" class="modal hidden">
        <div class="modal-content">

            <img id="birthday-cake" class="cake" src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="cake">

            <img id="modal-avatar" class="modal-avatar" alt="avatar">

            <div class="modal-header">
                <h2 id="modal-name"></h2>

            </div>

            <p id="modal-age"></p>

            <p id="modal-bio"></p>

            <button id="modal-faceit">FACEIT</button>

            <button onclick="closeModal()">X</button>
        </div>
    </div>

    <script src="player-modal.js" defer></script>

</body>

</html>
