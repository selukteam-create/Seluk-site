<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 MAIN</title>
    <link rel="icon" href="/Seluk-site/favicon.ico">
    <link rel="icon" href="./favicon.ico?v=2">
    <link rel="stylesheet" href="team.css">
</head>

<body>

    <main class="team-container">

        <h1 class="team-title">CS2 MAIN</h1>

        <div class="players">

            <div class="player captain" data-player="mitsua">
                <img src="./Media/crown.png" class="crown" alt="captain">
                <img src="./Media/mitsua.png" class="avatar" alt="Mitsua">
                <h3>Mitsua</h3>
                <span>In-Game Leader</span>
            </div>

            <div class="player" data-player="kuromi">
                <img src="./Media/kuromi.png" class="avatar" alt="Kuromi">
                <h3>Kuromi</h3>
                <span>Short Site Anchor</span>
            </div>

            <div class="player" data-player="zont1x">
                <img src="./Media/zont1x.png" class="avatar" alt="Zont1x">
                <h3>ASK1_</h3>
                <span>B Site Anchor</span>
            </div>

            <div class="player" data-player="chelstorm">
                <img src="./Media/chelstorm.png" class="avatar" alt="Chelstorm">
                <h3>Chelstorm</h3>
                <span>Connector Player</span>
            </div>

            <div class="player" data-player="Mernix">
            <img src="./Media/mernix.png" class="avatar">
            <div class="name">Mernix</div>
            <div class="role">A anchor</div>
            </div>
        </div>

    </main>
    
    <div id="player-modal" class="modal hidden">
        <div class="modal-content">

            <img id="modal-csstats" class="csstats-btn" src="./Media/csstats.png" alt="csstats">

            <img id="birthday-cake" class="cake" src="https://cdn-icons-png.flaticon.com/512/2705/2705873.png"
                alt="cake">

            <img id="modal-avatar" class="modal-avatar" alt="avatar">

            <div class="modal-header">
                <h2 id="modal-name"></h2>

            </div>

            <p id="modal-age"></p>
            <p id="modal-bio"></p>

            <button id="modal-faceit" class="faceit-btn">FACEIT</button>

            <div class="modal-socials">

                <img data-type="telegram" src="https://img.icons8.com/color/48/telegram-app.png" alt="">
                <img data-type="youtube" src="https://img.icons8.com/color/48/youtube-play.png" alt="">
                <img data-type="tiktok" src="https://img.icons8.com/color/48/tiktok.png" alt="">
                <img data-type="twitter" src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png" alt="">
                <img data-type="reddit" src="https://img.icons8.com/color/48/reddit.png" alt="">
                <img data-type="steam" src="https://img.icons8.com/color/48/steam.png" alt="">
                <img data-type="instagram" src="https://img.icons8.com/color/48/instagram-new.png" alt="">

            </div>

            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
    </div>

    <div id="birthday" class="birthday hidden">
        🎂 Happy Birthday!
    </div>

    <script src="player-modal.js" defer></script>

</body>

</html>
