<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG MAIN</title>
    <link rel="icon" href="./favicon.ico?v=2">
    <link rel="stylesheet" href="team.css">

    <style>
        .player[data-player="mrazota-king"] {
            position: relative;
        }

        .player[data-player="mrazota-king"]::after {
            content: "👑";
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 26px;
            z-index: 100;
            animation: kingCrownSpin 2s linear infinite;
            filter: drop-shadow(0 0 8px gold);
        }

        @keyframes kingCrownSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <main class="team-container">

        <h1 class="team-title">PUBG MAIN</h1>

        <div class="players" id="players"></div>

    </main>

    <div id="player-modal" class="modal hidden">
        <div class="modal-content">

            <img id="modal-csstats" class="csstats-btn" src="./Media/csstats.png" alt="stats">

            <img id="birthday-cake" class="cake"
                src="https://cdn-icons-png.flaticon.com/512/2705/2705873.png" alt="cake">

            <img id="modal-avatar" class="modal-avatar" alt="avatar">

            <div class="modal-header">
                <h2 id="modal-name"></h2>
            </div>

            <p id="modal-age"></p>
            <p id="modal-bio"></p>

            <button id="modal-faceit" class="faceit-btn">PROFILE</button>

            <div class="modal-socials">
                <img data-type="telegram" src="https://img.icons8.com/color/48/telegram-app.png">
                <img data-type="youtube" src="https://img.icons8.com/color/48/youtube-play.png">
                <img data-type="tiktok" src="https://img.icons8.com/color/48/tiktok.png">
                <img data-type="twitter" src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png">
                <img data-type="reddit" src="https://img.icons8.com/color/48/reddit.png">
                <img data-type="steam" src="https://img.icons8.com/color/48/steam.png">
                <img data-type="instagram" src="https://img.icons8.com/color/48/instagram-new.png">
            </div>

            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
    </div>

    <div id="birthday" class="birthday hidden">
        🎂 Happy Birthday!
    </div>

    <script>
        async function loadTeam() {
            try {
                const res = await fetch("./team-data.json");
                const data = await res.json();

                const team = data["pubg-main"];
                const container = document.getElementById("players");

                if (!team || !container) return;

                container.innerHTML = "";

                team.forEach(player => {
                    const id = player.name.toLowerCase();

                    const div = document.createElement("div");
                    div.className = "player";

                    if (id === "mrazota-king") {
                        div.setAttribute("data-player", "mrazota-king");
                    } else {
                        div.setAttribute("data-player", id);
                    }

                    div.innerHTML = `
                        <img src="${player.img}" class="avatar" alt="${player.name}">
                        <h3>${player.name}</h3>
                        <span>${player.role}</span>
                    `;

                    container.appendChild(div);
                });

            } catch (e) {
                console.error("Ошибка загрузки команды:", e);
            }
        }

        document.addEventListener("DOMContentLoaded", loadTeam);
    </script>

    <script src="player-modal.js" defer></script>

</body>

</html>
